services:
  - type: web
    name: mike-messenger-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false   # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set manually in Render dashboard
      - key: JWT_EXPIRE
        value: 30d
      - key: CLIENT_URL
        sync: false   # Set to your Vercel/Netlify frontend URL
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: ENCRYPTION_KEY
        sync: false
